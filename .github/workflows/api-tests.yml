name: API Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint API source & tests
        run: pnpm --filter @airalo/api lint

  unit-tests:
    name: Unit & Schema Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter @airalo/api test:unit

      - name: Run fixture contract tests
        run: pnpm --filter @airalo/api test:spec

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-unit-allure-results
          path: apps/api/allure-results
          retention-days: 30

  state-tests:
    name: State Machine Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run state machine tests
        run: pnpm --filter @airalo/api test:state

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-state-allure-results
          path: apps/api/allure-results
          retention-days: 30

  integration-tests:
    name: Live API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    environment: integration
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        env:
          AIRALO_CLIENT_ID: ${{ secrets.AIRALO_CLIENT_ID }}
          AIRALO_CLIENT_SECRET: ${{ secrets.AIRALO_CLIENT_SECRET }}
          AIRALO_BASE_URL: ${{ secrets.AIRALO_BASE_URL }}
        run: pnpm --filter @airalo/api test:integration

      - name: Run live contract tests
        env:
          AIRALO_CLIENT_ID: ${{ secrets.AIRALO_CLIENT_ID }}
          AIRALO_CLIENT_SECRET: ${{ secrets.AIRALO_CLIENT_SECRET }}
          AIRALO_BASE_URL: ${{ secrets.AIRALO_BASE_URL }}
        run: pnpm --filter @airalo/api test:live

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-integration-allure-results
          path: apps/api/allure-results
          retention-days: 30

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests, state-tests, integration-tests]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: api-unit-allure-results
          path: allure-results/unit
        continue-on-error: true

      - name: Download state test results
        uses: actions/download-artifact@v4
        with:
          name: api-state-allure-results
          path: allure-results/state
        continue-on-error: true

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: api-integration-allure-results
          path: allure-results/integration
        continue-on-error: true

      - name: Merge Allure results
        run: |
          mkdir -p allure-results/merged
          cp -r allure-results/unit/* allure-results/merged/ 2>/dev/null || true
          cp -r allure-results/state/* allure-results/merged/ 2>/dev/null || true
          cp -r allure-results/integration/* allure-results/merged/ 2>/dev/null || true

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy previous Allure history
        run: |
          mkdir -p allure-history
          cp -r gh-pages/api-allure/history allure-history/ 2>/dev/null || true

      - name: Test results summary
        if: always()
        run: |
          echo "## API Test Results Summary" >> "$GITHUB_STEP_SUMMARY"
          total=$(find allure-results/merged -name '*-result.json' 2>/dev/null | wc -l)
          passed=$(grep -rl '"status":"passed"' allure-results/merged/ 2>/dev/null | wc -l)
          failed=$(grep -rl '"status":"failed"' allure-results/merged/ 2>/dev/null | wc -l)
          broken=$(grep -rl '"status":"broken"' allure-results/merged/ 2>/dev/null | wc -l)
          skipped=$(grep -rl '"status":"skipped"' allure-results/merged/ 2>/dev/null | wc -l)
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total  | $total |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ Passed | $passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ❌ Failed | $failed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔧 Broken | $broken |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⏭️ Skipped | $skipped |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results/merged
          allure_report: allure-report
          allure_history: allure-history

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-allure-report
          path: allure-report
          retention-days: 30

      - name: Prepare publish directory
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p publish/api-allure
          cp -r allure-report/* publish/api-allure/
          cat > publish/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Airalo Test Reports</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #1a1a1a; }
              h1 { font-size: 1.6rem; margin-bottom: 1.5rem; }
              a { display: block; padding: 18px 22px; margin: 12px 0; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 8px; text-decoration: none; color: #0969da; font-weight: 600; font-size: 1rem; }
              a:hover { background: #ddf4ff; border-color: #0969da; }
              p { color: #57606a; font-size: 0.9rem; margin-top: 0; }
            </style>
          </head>
          <body>
            <h1>Airalo Test Reports</h1>
            <a href="./api-allure/">API Tests — Allure Report</a>
            <p>Unit, state-machine, integration &amp; contract tests</p>
            <a href="./web-allure/">Web Tests — Allure Report</a>
            <p>E2E browser, accessibility &amp; performance tests</p>
          </body>
          </html>
          EOF

      - name: Publish Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true
